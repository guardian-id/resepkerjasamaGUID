<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Resep Kerjasama</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    <div style="font-size: 22px; text-align: center; font-weight: bold;">FEEDBACK RESEP KERJASAMA</div>
    <div style="font-size: 14px; text-align: center;">Aplikasi ini digunakan dokter untuk memberikan feedback photo resep kerjasama</div>
    <div class="form-section">
        <hr>
        <div class="input-group">
        <label>Nomer ID</label>
        <input type="text" id="mainid" placeholder="Contoh: 6406" readonly>
        </div>

        <div class="input-group">
            <label>Nama Toko</label>
            <input type="text" id="mainstore" placeholder="Ketik nama toko Anda" readonly>
        </div>
        
        <div class="input-group">
            <label>Nama Pasien</label>
            <input type="text" id="mainpasien" placeholder="Ketik nama pasien Anda" readonly>
        </div>
        
        <div class="input-group">
            <label>Nomer Telepon/Alamat</label>
            <input type="text" id="mainalamat" placeholder="Ketik nomor telepon atau alamat Anda" readonly>
        </div>
        <!-- Tambahkan di atas tombol mainSendBtn -->
    <div class="input-group" style="text-align: center;">
    <label for="cameraInput" style="cursor: pointer; display: inline-block;">
    <div style="font-size: 30px; margin-bottom: 5px;">📷</div>
    <span style="font-size: 14px; color: #555;">Ambil Foto Resep</span>
    </label>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
    <!-- Tempat menampilkan preview foto -->
    <div id="previewContainer" style="margin-top: 10px; display: none;">
    <img id="photoPreview" src="" style="max-width: 100%; border-radius: 8px; border: 1px solid #ddd;">
    </div>
    </div>

        <button id="mainSendBtn">Submit Photo Resep</button>
    </div>
</div>

<script src="script.js"></script>
</body>

</html>
